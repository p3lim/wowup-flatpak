name: Tag

on:
  pull_request:
    types:
      - closed
    branches:
      - master

permissions:
  contents: write # needed to run `git push`
  actions: write # needed to trigger other workloads

jobs:
  tag:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'update-version'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get tag from PR name
        id: version
        run: |
          echo "version=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT

      - name: Setup Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email "<41898282+github-actions[bot]@users.noreply.github.com>"

      - name: Tag and push
        run: |
          git tag -a -m "Tag ${{ steps.version.outputs.version }}" ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Trigger deploy workflow
        # workflows won't trigger when other workflows do git actions, so we need to do this
        # https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication
        run: |
          gh workflow run deploy.yaml --ref ${{ steps.version.outputs.version }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
