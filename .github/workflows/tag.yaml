name: Tag

on:
  push:
    branches:
      - master
    paths:
      - io.wowup.WowUp.yml

permissions:
  contents: write # needed to run `git push`
  actions: write # needed to trigger other workloads

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get tag from latest commit
        id: version
        run: |
          echo "version=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT

      - name: Setup Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email "<41898282+github-actions[bot]@users.noreply.github.com>"

      - name: Tag and push
        run: |
          git tag -a -m "Tag ${{ steps.version.outputs.version }}" ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Trigger deploy workflow
        # workflows won't trigger when other workflows do git actions, so we need to do this
        # https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication
        run: |
          gh workflow run deploy.yaml --ref ${{ steps.version.outputs.version }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
